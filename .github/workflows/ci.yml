name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  vscode-governance:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-governance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vscode-governance/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  vscode-contracts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vscode-contracts/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  browser:
    runs-on: ubuntu-latest
    env:
      # Point the mirror tooling at the canonical repo checked out below, so the
      # cinema-core drift fence ENFORCES byte-identity independently of whether
      # @infrix/cinema-core has been published to a registry yet. A bad/missing
      # path makes vendor:check + the fence fail loudly (resolveSrcForCheck
      # throws when the env var is set but unresolvable) — never a silent skip.
      INFRIX_CINEMA_CORE_SRC: ${{ github.workspace }}/.infrix-cinema-core-src
    defaults:
      run:
        working-directory: browser
    steps:
      - uses: actions/checkout@v4
      # Canonical Cinema source. The invariant CI enforces is "the extension
      # mirror equals canonical HEAD". If the extension later pins a published
      # @infrix/cinema-core version instead, replace this checkout with an
      # `npm install` and drop the env var above.
      - name: Check out canonical @infrix/cinema-core
        uses: actions/checkout@v4
        with:
          repository: opendlt/infrix-cinema-core
          path: .infrix-cinema-core-src
          # For a private canonical repo, set a CINEMA_CORE_TOKEN secret with
          # read access; for a public repo the default workflow token suffices.
          token: ${{ secrets.CINEMA_CORE_TOKEN || github.token }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Fail the build if browser/cinema-core/ or popup.html drifted from canonical.
      - run: npm run vendor:check
      # The drift fence inside the suite also enforces because INFRIX_CINEMA_CORE_SRC
      # is set (it would otherwise skip when canonical is absent).
      - run: node --test --test-reporter=spec tests/*.test.mjs wallet/*.test.mjs wallet/hardware/*.test.mjs

  fences:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Relocated structural fences (governance, contracts, browser invariants).
      - run: node --test "fences/*.test.mjs"

# VS Code Marketplace publishing (`vsce publish` for infrix-governance +
# infrix-contracts, publisher `opendlt`) is a manual operator step until the
# npm/Marketplace credentials are wired — intentionally not automated here.
